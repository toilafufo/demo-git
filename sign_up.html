<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Pysclinic Consultant</title>
    <link rel="stylesheet" href="sign_up.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="bg-shape"></div>

    <div class="container">
        <header>
            <a href="index.html" class="logo">
                <img src="ảnh/logo.png" alt="Logo" class="logo-icon"> 
                <span class="logo-text">Pysclinic consultant</span>
            </a>
        </header>

        <main class="login-wrapper">
            <div class="login-card">
                <h2>Create Account</h2>
                <p class="subtitle">Start your journey to healing today.</p>

                <form action="#">
                    <div class="input-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" placeholder="Enter your full name" required>
                    </div>

                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Create a password" required>
                    </div>

                    <button type="submit" class="btn-login" style="margin-top: 10px;">Sign Up</button>
                </form>

                <p class="signup-link">Already have an account? <a href="login.html">Sign in</a></p>
            </div>
        </main>
    </div>

</body>
</html>
