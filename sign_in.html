<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Pysclinic Consultant</title>
    <link rel="stylesheet" href="sign_in.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="bg-shape"></div>

    <div class="container">
        <header>
            <a href="index.html" class="logo">
                <img src="ảnh/logo.png" alt="Logo" class="logo-icon"> 
                <span class="logo-text">Pysclinic consultant</span>
            </a>
        </header>

        <main class="login-wrapper">
            <div class="login-card">
                <h2>Welcome Back</h2>
                <p class="subtitle">Continue your journey to healing.</p>

                <form action="#">
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>

                    <div class="form-actions">
                        <label class="remember-me">
                            <input type="checkbox"> Remember me
                        </label>
                        <a href="#" class="forgot-pwd">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn-login">Sign In</button>
                </form>

                <p class="signup-link">Don't have an account? <a href="sign_up.html">Sign up</a></p>
            </div>
        </main>
    </div>

</body>
</html>
